syntax = "proto3";

package user.v1;

option go_package = "github.com/akhenakh/grpc-form/gen/user/v1;userv1";

import "buf/validate/validate.proto";
import "form/v1/annotations.proto";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
}

message CreateUserRequest {
  option (form.v1.title) = "Create user";
  option (form.v1.description) = "Add a new user to the system";

  string first_name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 64,
    (form.v1.field).label = "First name",
    (form.v1.field).placeholder = "Jane"
  ];

  string last_name = 2 [
    (buf.validate.field).string.min_len = 1,
    (form.v1.field).label = "Last name",
    (form.v1.field).placeholder = "Smith"
  ];

  string email = 3 [
    (buf.validate.field).string.email = true,
    (form.v1.field).label = "Email address",
    (form.v1.field).hint = "Must be a valid corporate email"
  ];

  Role role = 4 [(form.v1.field).label = "Role"];

  repeated string tags = 5 [
    (form.v1.field).label = "Tags",
    (form.v1.field).hint = "Press + to add"
  ];

  Address address = 6 [
    (form.v1.field).label = "Address",
    (form.v1.field).collapsible = true
  ];

  string internal_id = 7 [(form.v1.field).hidden = true];

  int32 age = 8 [
    (buf.validate.field).int32.gte = 18,
    (buf.validate.field).int32.lte = 120,
    (form.v1.field).label = "Age"
  ];

  oneof contact_method {
    string phone = 9 [(form.v1.field).label = "Phone"];
    string slack_handle = 10 [(form.v1.field).label = "Slack"];
  }
}

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_VIEWER = 1;
  ROLE_EDITOR = 2;
  ROLE_ADMIN = 3;
}

message Address {
  string street = 1 [(form.v1.field).label = "Street"];
  string city = 2 [(form.v1.field).label = "City"];
  string zip = 3 [(form.v1.field).label = "ZIP code"];
}

message CreateUserResponse {
  string message = 1;
  string user_id = 2;
}
